name: Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/civic_hub

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: civic_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d civic_hub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/db run push

      - run: pnpm run typecheck

      - run: pnpm run build
        env:
          PORT: 5173
          BASE_PATH: /

      - run: pnpm -r --if-present run test

      - run: pnpm run test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ${{ secrets.HOSTINGER_APP_DIR }}
            git pull origin main
            corepack enable
            pnpm install --frozen-lockfile
            pnpm --filter @workspace/db run push
            pnpm run build
            pm2 restart maryland-civic-hub || pm2 start "PORT=3001 pnpm --filter @workspace/api-server run start" --name maryland-civic-hub
            pm2 save
