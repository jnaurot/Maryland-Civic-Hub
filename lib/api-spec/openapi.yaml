openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Civic App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: representatives
    description: Look up representatives by address
  - name: federal
    description: Federal congressional data
  - name: state
    description: State legislature data
  - name: finance
    description: Campaign finance data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /representatives:
    get:
      operationId: getRepresentativesByAddress
      tags: [representatives]
      summary: Get all representatives for a given address
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Representatives found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepresentativesResponse"

  /federal/state-members:
    get:
      operationId: getFederalStateMembers
      tags: [federal]
      summary: Get all current federal members for a state
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: State members list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederalStateMembersResponse"

  /federal/members/{bioguideId}:
    get:
      operationId: getFederalMember
      tags: [federal]
      summary: Get a federal member's details
      parameters:
        - name: bioguideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FederalMemberDetail"

  /federal/members/{bioguideId}/bills:
    get:
      operationId: getFederalMemberBills
      tags: [federal]
      summary: Get bills sponsored or cosponsored by a federal member
      parameters:
        - name: bioguideId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [sponsored, cosponsored]
            default: sponsored
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Bills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillsListResponse"

  /federal/members/{bioguideId}/house-votes:
    get:
      operationId: getFederalMemberHouseVotes
      tags: [federal]
      summary: Get House roll call vote records for a federal member
      parameters:
        - name: bioguideId
          in: path
          required: true
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, yea, nay, present, not-voting]
            default: all
      responses:
        "200":
          description: House votes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseVotesListResponse"

  /federal/members/{bioguideId}/senate-votes:
    get:
      operationId: getFederalMemberSenateVotes
      tags: [federal]
      summary: Get Senate roll call vote records for a federal member
      parameters:
        - name: bioguideId
          in: path
          required: true
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, yea, nay, present, not-voting]
            default: all
      responses:
        "200":
          description: Senate votes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SenateVotesListResponse"

  /federal/members/{bioguideId}/committees:
    get:
      operationId: getFederalMemberCommittees
      tags: [federal]
      summary: Get committee memberships for a federal member
      parameters:
        - name: bioguideId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Committees list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitteesListResponse"

  /federal/bills:
    get:
      operationId: getFederalBills
      tags: [federal]
      summary: Get bills currently being considered in Congress
      parameters:
        - name: chamber
          in: query
          schema:
            type: string
            enum: [house, senate, both]
            default: both
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Bills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillsListResponse"

  /federal/bills/search:
    get:
      operationId: searchFederalBills
      tags: [federal]
      summary: Search federal bills by full-text query
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillsListResponse"

  /federal/bills/{congress}/{billType}/{billNumber}:
    get:
      operationId: getFederalBillDetail
      tags: [federal]
      summary: Get detailed info about a specific federal bill
      parameters:
        - name: congress
          in: path
          required: true
          schema:
            type: string
        - name: billType
          in: path
          required: true
          schema:
            type: string
        - name: billNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bill detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillDetail"

  /state/members/{memberId}:
    get:
      operationId: getStateMember
      tags: [state]
      summary: Get a state legislator's details
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: State member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateMemberDetailResponse"

  /state/members/{memberId}/refresh:
    post:
      operationId: refreshStateMember
      tags: [state]
      summary: Force refresh a state legislator from OpenStates
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refreshed state member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateMemberDetailResponse"

  /state/members/{memberId}/bills:
    get:
      operationId: getStateMemberBills
      tags: [state]
      summary: Get bills sponsored or cosponsored by a state member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [sponsored, cosponsored]
            default: sponsored
        - name: jurisdiction
          in: query
          schema:
            type: string
            default: md
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: State bills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateBillsListResponse"

  /state/members/{memberId}/votes:
    get:
      operationId: getStateMemberVotes
      tags: [state]
      summary: Get voting record for a state member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: jurisdiction
          in: query
          schema:
            type: string
            default: md
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, yea, nay, present, not-voting]
            default: all
      responses:
        "200":
          description: State votes list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateVotesListResponse"

  /state/bills:
    get:
      operationId: getStateBills
      tags: [state]
      summary: Get bills being considered in a state legislature
      parameters:
        - name: chamber
          in: query
          schema:
            type: string
            enum: [upper, lower]
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: jurisdiction
          in: query
          schema:
            type: string
            default: md
      responses:
        "200":
          description: State bills list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateBillsListResponse"

  /state/bills/search:
    get:
      operationId: searchStateBills
      tags: [state]
      summary: Search state bills by full-text query
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: jurisdiction
          in: query
          schema:
            type: string
            default: md
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateBillsListResponse"

  /state/bills/{billId}:
    get:
      operationId: getStateBillDetail
      tags: [state]
      summary: Get detailed info about a specific state bill
      parameters:
        - name: billId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: State bill detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateBillDetail"

  /finance/{candidateId}:
    get:
      operationId: getCandidateFinance
      tags: [finance]
      summary: Get PAC and donor information for a candidate
      parameters:
        - name: candidateId
          in: path
          required: true
          schema:
            type: string
        - name: cycle
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Finance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceResponse"

  /finance/search:
    get:
      operationId: searchCandidateFinance
      tags: [finance]
      summary: Search for a candidate's FEC finance data by name
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Finance search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSearchResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Representative:
      type: object
      properties:
        name:
          type: string
        office:
          type: string
        party:
          type: string
        phone:
          type: string
        photoUrl:
          type: string
        level:
          type: string
          enum: [federal, state, local]
        chamber:
          type: string
        urls:
          type: array
          items:
            type: string
        emails:
          type: array
          items:
            type: string
        bioguideId:
          type: string
        openstatesId:
          type: string
        division:
          type: string
      required: [name, office, level]

    RepresentativesResponse:
      type: object
      properties:
        address:
          type: string
        representatives:
          type: array
          items:
            $ref: "#/components/schemas/Representative"
        normalizedAddress:
          type: string
        stateCode:
          type: string
        stateName:
          type: string
        stateSenateDistrict:
          type: string
        stateHouseDistrict:
          type: string
        stateRepCache:
          $ref: "#/components/schemas/CacheMeta"
      required: [address, representatives]

    FederalStateMembersResponse:
      type: object
      properties:
        stateCode:
          type: string
        stateName:
          type: string
        representatives:
          type: array
          items:
            $ref: "#/components/schemas/Representative"
        stateRepCache:
          $ref: "#/components/schemas/CacheMeta"
      required: [stateCode, stateName, representatives]

    Bill:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        number:
          type: string
        congress:
          type: string
        introducedDate:
          type: string
        latestAction:
          type: string
        latestActionDate:
          type: string
        sponsors:
          type: array
          items:
            type: string
        url:
          type: string
        status:
          type: string
        chamber:
          type: string
        policyArea:
          type: string
        subjects:
          type: array
          items:
            type: string
      required: [id, title]

    BillDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        number:
          type: string
        congress:
          type: string
        introducedDate:
          type: string
        summary:
          type: string
        status:
          type: string
        latestAction:
          type: string
        latestActionDate:
          type: string
        sponsors:
          type: array
          items:
            $ref: "#/components/schemas/SponsorInfo"
        cosponsors:
          type: array
          items:
            $ref: "#/components/schemas/SponsorInfo"
        committees:
          type: array
          items:
            $ref: "#/components/schemas/CommitteeRef"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/BillAction"
        url:
          type: string
        textUrl:
          type: string
        policyArea:
          type: string
        subjects:
          type: array
          items:
            type: string
      required: [id, title]

    SponsorInfo:
      type: object
      properties:
        name:
          type: string
        party:
          type: string
        state:
          type: string
        bioguideId:
          type: string
        openstatesId:
          type: string
      required: [name]

    CommitteeRef:
      type: object
      properties:
        name:
          type: string
        chamber:
          type: string
        committeeCode:
          type: string
      required: [name]

    BillAction:
      type: object
      properties:
        date:
          type: string
        text:
          type: string
        type:
          type: string
      required: [date, text]

    BillsListResponse:
      type: object
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/Bill"
        totalCount:
          type: integer
        offset:
          type: integer
      required: [bills]

    VoteRecord:
      type: object
      properties:
        billId:
          type: string
        billTitle:
          type: string
        billNumber:
          type: string
        date:
          type: string
        position:
          type: string
        question:
          type: string
        result:
          type: string
        description:
          type: string
      required: [billTitle, date, position]

    VotesListResponse:
      type: object
      properties:
        votes:
          type: array
          items:
            $ref: "#/components/schemas/VoteRecord"
        totalCount:
          type: integer
        offset:
          type: integer
      required: [votes]

    HouseVoteRecord:
      type: object
      properties:
        rollCallNumber:
          type: integer
        date:
          type: string
        legislationType:
          type: string
        legislationNumber:
          type: string
        voteQuestion:
          type: string
        voteDescription:
          type: string
        voteResult:
          type: string
        voteCast:
          type: string
          enum: [Yea, Nay, Present, "Not Voting"]
      required: [rollCallNumber, date, voteCast]

    HouseVotesListResponse:
      type: object
      properties:
        votes:
          type: array
          items:
            $ref: "#/components/schemas/HouseVoteRecord"
        totalCount:
          type: integer
        offset:
          type: integer
      required: [votes]

    SenateVoteRecord:
      type: object
      properties:
        rollCallNumber:
          type: integer
        date:
          type: string
        documentType:
          type: string
        documentNumber:
          type: string
        voteQuestion:
          type: string
        voteTitle:
          type: string
        voteResult:
          type: string
        voteCast:
          type: string
          enum: [Yea, Nay, Present, "Not Voting"]
      required: [rollCallNumber, date, voteCast]

    SenateVotesListResponse:
      type: object
      properties:
        votes:
          type: array
          items:
            $ref: "#/components/schemas/SenateVoteRecord"
        totalCount:
          type: integer
        offset:
          type: integer
      required: [votes]

    Committee:
      type: object
      properties:
        name:
          type: string
        chamber:
          type: string
        committeeCode:
          type: string
        rank:
          type: string
        title:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/CommitteeMember"
      required: [name]

    CommitteeMember:
      type: object
      properties:
        name:
          type: string
        party:
          type: string
        state:
          type: string
        rank:
          type: string
        bioguideId:
          type: string
      required: [name]

    CommitteesListResponse:
      type: object
      properties:
        committees:
          type: array
          items:
            $ref: "#/components/schemas/Committee"
      required: [committees]

    FederalMemberDetail:
      type: object
      properties:
        bioguideId:
          type: string
        name:
          type: string
        party:
          type: string
        state:
          type: string
        chamber:
          type: string
        district:
          type: string
        phone:
          type: string
        website:
          type: string
        photoUrl:
          type: string
        terms:
          type: integer
        inOffice:
          type: boolean
        nextElection:
          type: string
      required: [bioguideId, name]

    StateMemberDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        party:
          type: string
        chamber:
          type: string
        district:
          type: string
        email:
          type: string
        phone:
          type: string
        photoUrl:
          type: string
        openstatesUrl:
          type: string
        state:
          type: string
        jurisdiction:
          type: string
      required: [id, name]

    CacheMeta:
      type: object
      properties:
        source:
          type: string
          enum: [db, openstates]
        stale:
          type: boolean
        fetchedAt:
          type: string
        refreshFailed:
          type: boolean
      required: [source, stale, fetchedAt]

    StateMemberDetailResponse:
      type: object
      properties:
        legislator:
          $ref: "#/components/schemas/StateMemberDetail"
        cache:
          $ref: "#/components/schemas/CacheMeta"
      required: [legislator, cache]

    StateBill:
      type: object
      properties:
        id:
          type: string
        identifier:
          type: string
        title:
          type: string
        session:
          type: string
        chamber:
          type: string
        status:
          type: string
        introducedDate:
          type: string
        latestAction:
          type: string
        latestActionDate:
          type: string
        sponsors:
          type: array
          items:
            type: string
        url:
          type: string
        subjects:
          type: array
          items:
            type: string
      required: [id, title]

    StateBillDetail:
      type: object
      properties:
        id:
          type: string
        identifier:
          type: string
        title:
          type: string
        session:
          type: string
        chamber:
          type: string
        status:
          type: string
        introducedDate:
          type: string
        summary:
          type: string
        sponsors:
          type: array
          items:
            $ref: "#/components/schemas/SponsorInfo"
        cosponsors:
          type: array
          items:
            $ref: "#/components/schemas/SponsorInfo"
        committees:
          type: array
          items:
            $ref: "#/components/schemas/CommitteeRef"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/BillAction"
        votes:
          type: array
          items:
            $ref: "#/components/schemas/StateBillVote"
        url:
          type: string
        textUrl:
          type: string
        subjects:
          type: array
          items:
            type: string
      required: [id, title]

    StateBillVote:
      type: object
      properties:
        date:
          type: string
        chamber:
          type: string
        result:
          type: string
        yesCount:
          type: integer
        noCount:
          type: integer
        absentCount:
          type: integer
      required: [date, result]

    StateBillsListResponse:
      type: object
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/StateBill"
        totalCount:
          type: integer
        offset:
          type: integer
      required: [bills]

    StateVoteRecord:
      type: object
      properties:
        billId:
          type: string
        billTitle:
          type: string
        billIdentifier:
          type: string
        date:
          type: string
        position:
          type: string
        result:
          type: string
      required: [billTitle, date, position]

    StateVotesListResponse:
      type: object
      properties:
        votes:
          type: array
          items:
            $ref: "#/components/schemas/StateVoteRecord"
        totalCount:
          type: integer
        offset:
          type: integer
      required: [votes]

    DonorEntry:
      type: object
      properties:
        name:
          type: string
        total:
          type: number
        type:
          type: string
          enum: [pac, individual, other]
        industry:
          type: string
      required: [name, total]

    FinanceResponse:
      type: object
      properties:
        candidateId:
          type: string
        candidateName:
          type: string
        cycle:
          type: integer
        totalRaised:
          type: number
        totalSpent:
          type: number
        cashOnHand:
          type: number
        topDonors:
          type: array
          items:
            $ref: "#/components/schemas/DonorEntry"
        topIndustries:
          type: array
          items:
            $ref: "#/components/schemas/DonorEntry"
      required: [candidateId, candidateName, topDonors]

    FinanceCandidate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        party:
          type: string
        state:
          type: string
        office:
          type: string
        cycle:
          type: integer
      required: [id, name]

    FinanceSearchResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/FinanceCandidate"
      required: [candidates]
